name: viralscan
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python runtime
  - python=3.11

  # Required external tools (only available via conda/bioconda)
  - kb-python>=0.28.2
  - snakemake>=7.0.0

  # Core scientific stack
  - numpy>=1.24
  - pandas>=1.5
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn>=0.12
  - scanpy>=1.9
  - plotly>=5.13

  # Utility
  - pyyaml>=6.0
  - requests>=2.28
  - jinja2>=3.0
  - pyfiglet>=0.8

  # Development extras (comment out for production)
  - pytest>=7
  - pytest-cov
  - ruff
  - mypy
  - pre-commit

  # pip is used for local source installs: python -m pip install -e .
  - pip
