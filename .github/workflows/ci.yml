name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      # mypy is informational until PR 9 enables strict typing per module.
      - name: mypy (informational)
        continue-on-error: true
        run: mypy src/viralscan

  test:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Editable install of the project itself is intentionally avoided:
      # snakemake's ``connection_pool`` transitive dep does not build cleanly
      # with current setuptools (see CLAUDE.md). The unit tests do not need
      # snakemake at runtime, so we install only what they import.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov responses pyyaml "requests>=2.28" pyfiglet

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --cov=viralscan --cov-report=term-missing

      - name: CLI smoke test (--help parses)
        env:
          PYTHONPATH: src
        run: python -m viralscan.menu --help
