name: Release

# Push a tag like ``v2.3.0`` to trigger a build and publish to PyPI.
# Requires a configured PyPI Trusted Publisher for this repository:
#   https://docs.pypi.org/trusted-publishers/
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF##*/}"
          # Strip leading "v" if present.
          tag_version="${tag#v}"
          pkg_version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match pyproject version $pkg_version"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ViralScan
    permissions:
      # OIDC token for PyPI Trusted Publishing.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
